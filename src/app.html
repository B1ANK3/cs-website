<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <style>
            /* Fonts */
            /* Regular */
            @font-face {
                font-family: 'SU Raleway', sans-serif;
                src:
                    url('/fonts/SU_Raleway-Regular.woff2') format('woff2'),
                    url('/fonts/SU_Raleway-Regular.woff') format('woff');
                font-weight: 400;
                font-style: normal;
            }

            /* Medium */
            @font-face {
                font-family: 'SU Raleway', sans-serif;
                src:
                    url('/fonts/SU_Raleway-Medium.woff2') format('woff2'),
                    url('/fonts/SU_Raleway-Medium.woff') format('woff');
                font-weight: 500;
                font-style: normal;
            }

            /* SemiBold */
            @font-face {
                font-family: 'SU Raleway', sans-serif;
                src:
                    url('/fonts/SU_Raleway-SemiBold.woff2') format('woff2'),
                    url('/fonts/SU_Raleway-SemiBold.woff') format('woff');
                font-weight: 600;
                font-style: normal;
            }

            /* Bold */
            @font-face {
                font-family: 'SU Raleway', sans-serif;
                src:
                    url('/fonts/SU_Raleway-Bold.woff2') format('woff2'),
                    url('/fonts/SU_Raleway-Bold.woff') format('woff');
                font-weight: 700;
                font-style: normal;
            }

            /* Italic */
            @font-face {
                font-family: 'SU Raleway', sans-serif;
                src:
                    url('/fonts/SU_Raleway-Italic.woff2') format('woff2'),
                    url('/fonts/SU_Raleway-Italic.woff') format('woff');
                font-weight: 400;
                font-style: italic;
            }

            /* Light */
            @font-face {
                font-family: 'SU Raleway', sans-serif;
                src:
                    url('/fonts/SU_Raleway-Light.woff2') format('woff2'),
                    url('/fonts/SU_Raleway-Light.woff') format('woff');
                font-weight: 300;
                font-style: normal;
            }

            /* SemiBold Italic */
            @font-face {
                font-family: 'SU Raleway', sans-serif;
                src:
                    url('/fonts/SU_Raleway-SemiBoldItalic.woff2') format('woff2'),
                    url('/fonts/SU_Raleway-SemiBoldItalic.woff') format('woff');
                font-weight: 600;
                font-style: italic;
            }
        </style>

        <link href="https://cdn.skypack.dev/sanitize.css" rel="stylesheet" />
        %sveltekit.head%
    </head>

    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
