name: Build and Deploy to GitHub Pages

on:
    push:
        branches: 'main'

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: latest

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # Always run these checks so that all errors are accounted for
            # Don't want any error to manifest in prod 
            - name: Check code
              run: pnpm run check

            - name: Lint code
              run: pnpm run lint

            - name: Build project
              env: 
                  BASE_PATH: '/${{ github.event.repository.name }}'
              run: |
                  pnpm run build

            - name: Upload Artifacts
              uses: actions/upload-pages-artifact@v3
              with:
                  name: build
                  path: build/

    deploy:
        needs: build
        runs-on: ubuntu-latest

        permissions:
            pages: write
            id-token: write

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v4
